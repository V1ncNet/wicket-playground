services:
  keycloak:
    image: keycloak/keycloak:26.0.1
    command: start-dev --import-realm
    volumes:
      - ./docker/keycloak/provisioning:/opt/keycloak/data/import
    ports:
      - "8180:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: secret
