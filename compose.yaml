volumes:
  keycloak_database_data:

networks:
  keycloak_backend:

services:
  gateway:
    image: traefik:3.1
    command: |
      --api.insecure=true
      --providers.docker
      --providers.docker.exposedbydefault=false
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  keycloak-database:
    image: postgres:16.4-alpine
    volumes:
      - keycloak_database_data:/var/lib/postgresql/data
    networks:
      - keycloak_backend
    environment:
      POSTGRES_PASSWORD: fb93b60f8a9eebf7
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -q -U postgres'" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: keycloak/keycloak:26.0.1
    depends_on:
      gateway:
        condition: service_started
      keycloak-database:
        condition: service_healthy
    command: start-dev --import-realm
    volumes:
      - ./docker/keycloak/provisioning:/opt/keycloak/data/import
      - ./docker/keycloak/healthcheck.sh:/opt/keycloak/healthcheck.sh:ro
    networks:
      - keycloak_backend
      - default
    ports:
      - "8180:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: secret
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-database
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: postgres
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: fb93b60f8a9eebf7
      KC_HEALTH_ENABLED: 'true'
      KC_HOSTNAME: http://host.docker.internal/auth
      KC_HTTP_ENABLED: 'true'
      KC_FEATURES: persistent-user-sessions
    healthcheck:
      test: [ "CMD", "/bin/bash", "/opt/keycloak/healthcheck.sh" ]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      traefik.enable: 'true'
      traefik.http.middlewares.keycloak_stripprefix.stripprefix.prefixes: /auth
      traefik.http.routers.keycloak.middlewares: keycloak_stripprefix
      traefik.http.routers.keycloak.rule: Host(`host.docker.internal`) && PathPrefix(`/auth`)
      traefik.http.routers.keycloak.service: keycloak
      traefik.http.services.keycloak.loadbalancer.server.port: '8080'

  server:
    build:
      context: apps/server/
    depends_on:
      gateway:
        condition: service_started
      keycloak:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://host.docker.internal/auth/realms/local
    healthcheck:
      test: [ "CMD", "/opt/java/openjdk/bin/java", "-cp", "/usr/local/bin", "Healthcheck" ]
      interval: 20s
      timeout: 2s
      retries: 5
      start_period: 3s
    labels:
      traefik.enable: 'true'
      traefik.http.middlewares.server_stripprefix.stripprefix.prefixes: /server
      traefik.http.routers.server.middlewares: server_stripprefix
      traefik.http.routers.server.rule: Host(`host.docker.internal`) && PathPrefix(`/server`)
      traefik.http.routers.server.service: server
      traefik.http.services.server.loadbalancer.server.port: '8080'

  client:
    build:
      context: apps/client/
    depends_on:
      gateway:
        condition: service_started
      keycloak:
        condition: service_started
      server:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PLAYGROUND_BACKEND_BASE_URL: http://host.docker.internal/server
      AUTH_SECRET: "uLT84pISxuSxFrOSRirr3WRl9ZdrfYkeFlCyJC9oSD4="
      AUTH_TRUST_HOST: 'true'
      AUTH_URL: http://host.docker.internal
      AUTH_KEYCLOAK_ID: test
      AUTH_KEYCLOAK_SECRET: AvlS5uX5CkCaZTXiyyOl19C7v0JqYzuZ
      AUTH_KEYCLOAK_ISSUER: http://host.docker.internal/auth/realms/local
    labels:
      traefik.enable: 'true'
      traefik.http.routers.client.rule: Host(`host.docker.internal`)
      traefik.http.routers.client.service: client
      traefik.http.services.client.loadbalancer.server.port: '3000'
