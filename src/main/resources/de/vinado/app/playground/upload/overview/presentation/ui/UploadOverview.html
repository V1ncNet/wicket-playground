<!doctype html>
<html lang="en" xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>
    <div class="table-responsive">
        <table class="table">
            <thead>
            <tr>
                <th class="text-center">Status</th>
                <th>Filename</th>
            </tr>
            </thead>
            <tbody>
            <tr wicket:id="documents">
                <td class="text-center"><i wicket:id="status"></i></td>
                <td wicket:id="filename"></td>
            </tr>
            </tbody>
        </table>
    </div>
</wicket:panel>
</body>
</html>
